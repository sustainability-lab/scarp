name: Deploy viewer to GitHub Pages

# Builds the WASM viewer and publishes web/ as a static site. No server.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm bundle
        working-directory: crates/objv-viewer
        run: wasm-pack build --target web --release --out-dir ../../web/pkg
      - name: Stage site
        run: |
          mkdir -p _site
          cp -r web/* _site/
          cp CHANGELOG.md _site/CHANGELOG.md
          touch _site/.nojekyll
          # Never publish raw OBJ or the heavy full-res mesh; the small sample stays.
          rm -f _site/*.obj _site/WadiBirk_web.objv _site/WadiBirk_full.objv _site/Village.objv

          # Cache-busting: stamp the short SHA into asset URLs so a new deploy is
          # always fetched (GitHub Pages otherwise serves cached .js/.wasm).
          BUILD="${GITHUB_SHA::7}"
          BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          find _site \( -name '*.html' -o -name '*.js' \) -exec sed -i "s/__BUILD__/${BUILD}/g" {} +
          printf '{"short":"%s","sha":"%s","builtAt":"%s"}\n' "$BUILD" "$GITHUB_SHA" "$BUILT_AT" > _site/build-info.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
